services:
  app:
    build: .
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    restart: always
